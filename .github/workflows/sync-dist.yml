name: Sync Sub-Store Front-End Dist

on:
  workflow_dispatch:
  schedule:
    # 每 6 小时同步一次
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync-dist:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出仓库
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 2. 获取最新 release 信息
      - name: Get Latest Release
        id: release
        run: |
          set -euo pipefail

          API_URL="https://api.github.com/repos/sub-store-org/Sub-Store-Front-End/releases/latest"

          RELEASE_JSON=$(curl -fsSL "$API_URL")

          VERSION=$(echo "$RELEASE_JSON" | jq -r '.tag_name')

          DIST_URL=$(echo "$RELEASE_JSON" | jq -r '
            .assets[]
            | select(.name == "dist.zip")
            | .browser_download_url
          ')

          if [ -z "$DIST_URL" ] || [ "$DIST_URL" = "null" ]; then
            echo "❌ 未找到 dist.zip"
            exit 1
          fi

          echo "VERSION=$VERSION"
          echo "DIST_URL=$DIST_URL"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "dist_url=$DIST_URL" >> $GITHUB_OUTPUT

      # 3. 下载 dist.zip
      - name: Download dist.zip
        run: |
          set -euo pipefail

          curl -fL \
            "${{ steps.release.outputs.dist_url }}" \
            -o dist.zip

          echo "下载完成："
          ls -lh dist.zip

      # 4. 解压文件
      - name: Extract dist.zip
        run: |
          set -euo pipefail

          mkdir -p temp

          unzip -q dist.zip -d temp

          echo "解压完成"

          find temp -maxdepth 2 -type f | head

      # 5. 清理旧文件
      - name: Clean old files
        run: |
          set -euo pipefail

          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name 'temp' \
            ! -name 'dist.zip' \
            -exec rm -rf {} +

      # 6. 同步新 dist 文件
      - name: Sync dist files
        run: |
          set -euo pipefail

          # 判断真实 dist 目录
          if [ -d "temp/dist" ]; then
            SOURCE_DIR="temp/dist"
          else
            SOURCE_DIR="temp"
          fi

          echo "同步目录: $SOURCE_DIR"

          rsync -av --delete "$SOURCE_DIR/" ./

      # 7. 清理临时文件
      - name: Cleanup temp files
        run: |
          rm -rf temp dist.zip

      # 8. 提交变更
      - name: Commit changes
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "✅ 没有文件变化"
            exit 0
          fi

          git commit -m "sync: Sub-Store Front-End ${{ steps.release.outputs.version }}"

      # 9. 推送
      - name: Push changes
        run: |
          git push origin main

      # 10. 输出结果
      - name: Done
        if: always()
        run: |
          echo "✅ Workflow Finished"
          echo "📦 Version: ${{ steps.release.outputs.version }}"
          echo "🕒 Time: $(date)"
