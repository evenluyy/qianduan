name: Sync Sub-Store Front-End Dist

on:
  workflow_dispatch:
  schedule:
    - cron: "10 13 * * 6"

permissions:
  contents: write

jobs:
  sync-dist:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 2. 获取最新 release
      - name: Get Latest Release
        id: release
        run: |
          set -euo pipefail

          API_URL="https://api.github.com/repos/sub-store-org/Sub-Store-Front-End/releases/latest"

          RELEASE_JSON=$(curl -fsSL "$API_URL")

          VERSION=$(echo "$RELEASE_JSON" | jq -r '.tag_name')

          DIST_URL=$(echo "$RELEASE_JSON" | jq -r '
            .assets[]
            | select(.name == "dist.zip")
            | .browser_download_url
          ')

          if [ -z "$DIST_URL" ] || [ "$DIST_URL" = "null" ]; then
            echo "❌ dist.zip not found"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "dist_url=$DIST_URL" >> $GITHUB_OUTPUT

          echo "Version: $VERSION"
          echo "Dist URL: $DIST_URL"

      # 3. 下载 dist.zip
      - name: Download dist.zip
        run: |
          set -euo pipefail

          curl -fL \
            "${{ steps.release.outputs.dist_url }}" \
            -o dist.zip

          ls -lh dist.zip

      # 4. 解压
      - name: Extract dist.zip
        run: |
          set -euo pipefail

          mkdir -p temp

          unzip -q dist.zip -d temp

          echo "Extracted files:"
          find temp -maxdepth 2 -type f | head -20

      # 5. 同步 dist 文件
      - name: Sync dist files
        run: |
          set -euo pipefail

          if [ -d "temp/dist" ]; then
            SOURCE_DIR="temp/dist"
          else
            SOURCE_DIR="temp"
          fi

          echo "Source directory: $SOURCE_DIR"

          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'temp' \
            --exclude 'dist.zip' \
            "$SOURCE_DIR/" ./

      # 6. 清理
      - name: Cleanup
        run: |
          rm -rf temp dist.zip

      # 7. Commit
      - name: Commit changes
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "✅ No changes"
            exit 0
          fi

          git commit -m "sync: Sub-Store Front-End ${{ steps.release.outputs.version }}"

      # 8. Push
      - name: Push changes
        run: |
          git push origin main

      # 9. Done
      - name: Done
        if: always()
        run: |
          echo "✅ Sync completed"
          echo "📦 Version: ${{ steps.release.outputs.version }}"
          echo "🕒 $(date)"
